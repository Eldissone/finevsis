version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finevsis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finevsis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finevsis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-finevsis_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finevsis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finevsis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finevsis_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finevsis}:${POSTGRES_PASSWORD:-finevsis_secret}@postgres:5432/${POSTGRES_DB:-finevsis_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai_service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: finevsis_ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finevsis}:${POSTGRES_PASSWORD:-finevsis_secret}@postgres:5432/${POSTGRES_DB:-finevsis_db}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ai:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finevsis_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_AI_URL: ${VITE_AI_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
